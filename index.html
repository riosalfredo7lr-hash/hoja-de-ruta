<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">
<title>Clientes</title>

<style>
body { font-family: Arial; padding: 20px; background: #f4f4f4; }
form, .filtro, .mensaje-box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
input, select, button, textarea { padding: 6px; margin: 5px; }
textarea { width: 100%; height: 60px; }
table { width: 100%; border-collapse: collapse; background: white; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background: #ddd; }
</style>
</head>

<body>

<h2>Cargar Cliente</h2>

<form id="form">
<input type="text" id="codigo" placeholder="Código" required>
<input type="text" id="nombre" placeholder="Nombre" required>
<input type="text" id="razon" placeholder="Razón Social" required>
<input type="text" id="telefono" placeholder="Teléfono">

<select id="dia" required>
<option value="">Día</option>
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
<option>Sábado</option>
</select>

<button type="submit">Agregar</button>
</form>

<div class="mensaje-box">
<strong>Mensaje (usar {nombre}):</strong>
<textarea id="mensaje"></textarea>
</div>

<div class="filtro">
<strong>Filtrar:</strong>
<select id="filtroDia">
<option value="todos">Todos</option>
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
<option>Sábado</option>
</select>

<input type="text" id="buscar" placeholder="Buscar...">
</div>

<!-- OBJETIVOS -->
<div class="filtro">
<strong>Objetivos:</strong><br>
CCC <input type="number" id="objCCC" value="0">
DIG <input type="number" id="objDIG" value="0">
PORTA <input type="number" id="objPORTA" value="0">
TP <input type="number" id="objTP" value="0">
<button onclick="guardarObjetivos()">Guardar</button>
</div>

<!-- GRAFICO -->
<div class="filtro">
<strong>Progreso:</strong>
<canvas id="grafico" width="400" height="200"></canvas>
</div>

<button onclick="exportar()">📥 Exportar Excel</button>

<h2>Listado</h2>

<table id="tabla">
<thead>
<tr>
<th>Código</th>
<th>Nombre</th>
<th>Razón</th>
<th>Teléfono</th>
<th>Día</th>
<th>CCC</th>
<th>DIG</th>
<th>PORTA</th>
<th>TP</th>
<th>IN1</th>
<th>IN2</th>
<th>Editar</th>
<th>WA</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const tablaBody = document.querySelector("#tabla tbody");
const form = document.getElementById("form");
const mensajeInput = document.getElementById("mensaje");
const filtroDia = document.getElementById("filtroDia");
const buscar = document.getElementById("buscar");
const grafico = document.getElementById("grafico");

// ===== GUARDAR CLIENTES =====
function guardarDatos() {
let datos = [];
for (let fila of tablaBody.rows) {
datos.push({
codigo: fila.cells[0].textContent,
nombre: fila.cells[1].textContent,
razon: fila.cells[2].textContent,
telefono: fila.cells[3].textContent,
dia: fila.cells[4].textContent,
checks: [...Array(6)].map((_,i)=>fila.cells[i+5].querySelector("input").checked)
});
}
localStorage.setItem("clientes", JSON.stringify(datos));
}

// ===== MENSAJE =====
mensajeInput.oninput = ()=> localStorage.setItem("mensajeWA", mensajeInput.value);

// ===== OBJETIVOS =====
function guardarObjetivos() {
const objetivos = {
CCC: objCCC.value,
DIG: objDIG.value,
PORTA: objPORTA.value,
TP: objTP.value
};
localStorage.setItem("objetivos", JSON.stringify(objetivos));
actualizarGrafico();
}

// ===== GRAFICO =====
function actualizarGrafico() {
let avance = {CCC:0,DIG:0,PORTA:0,TP:0};

for (let fila of tablaBody.rows) {
if (fila.cells[5].querySelector("input").checked) avance.CCC++;
if (fila.cells[6].querySelector("input").checked) avance.DIG++;
if (fila.cells[7].querySelector("input").checked) avance.PORTA++;
if (fila.cells[8].querySelector("input").checked) avance.TP++;
}

const objetivos = JSON.parse(localStorage.getItem("objetivos")) || {};

const ctx = grafico.getContext("2d");
ctx.clearRect(0,0,400,200);

const keys = ["CCC","DIG","PORTA","TP"];

keys.forEach((k,i)=>{
let x = i*90+20;
let obj = parseInt(objetivos[k]||0);
let val = avance[k];
let max = Math.max(obj,val,1);

let hObj = (obj/max)*150;
let hVal = (val/max)*150;

// objetivo
ctx.fillStyle="#ccc";
ctx.fillRect(x,180-hObj,30,hObj);

// avance
ctx.fillStyle="#4CAF50";
ctx.fillRect(x+35,180-hVal,30,hVal);

// textos
ctx.fillStyle="black";
ctx.fillText(k,x,195);
ctx.fillText(obj,x,180-hObj-5);
ctx.fillText(val,x+35,180-hVal-5);
});
}

// ===== CREAR FILA =====
function crearFila(cli) {
const fila = tablaBody.insertRow();

fila.insertCell(0).textContent=cli.codigo;
fila.insertCell(1).textContent=cli.nombre;
fila.insertCell(2).textContent=cli.razon;
fila.insertCell(3).textContent=cli.telefono;
fila.insertCell(4).textContent=cli.dia;

cli.checks.forEach(chk=>{
let c=document.createElement("input");
c.type="checkbox";
c.checked=chk;
c.onchange=()=>{guardarDatos();actualizarGrafico();};
fila.insertCell(-1).appendChild(c);
});

// editar
let btnE=document.createElement("button");
btnE.textContent="Editar";
btnE.onclick=()=>{
if(btnE.textContent==="Editar"){
for(let i=0;i<5;i++){
let v=fila.cells[i].textContent;
fila.cells[i].innerHTML=`<input value="${v}">`;
}
btnE.textContent="Guardar";
}else{
for(let i=0;i<5;i++){
fila.cells[i].textContent=fila.cells[i].querySelector("input").value;
}
btnE.textContent="Editar";
guardarDatos();
}
};
fila.insertCell(-1).appendChild(btnE);

// whatsapp
let btnW=document.createElement("button");
btnW.textContent="WA";
btnW.onclick=()=>{
let tel=fila.cells[3].textContent.replace(/\D/g,"");
if(!tel.startsWith("54")) tel="54"+tel;
let msg=mensajeInput.value.replace("{nombre}",fila.cells[1].textContent);
window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
};
fila.insertCell(-1).appendChild(btnW);
}

// ===== CARGAR =====
function cargarDatos(){
(JSON.parse(localStorage.getItem("clientes"))||[]).forEach(crearFila);

mensajeInput.value=localStorage.getItem("mensajeWA")||"";

let obj=JSON.parse(localStorage.getItem("objetivos"))||{};
objCCC.value=obj.CCC||0;
objDIG.value=obj.DIG||0;
objPORTA.value=obj.PORTA||0;
objTP.value=obj.TP||0;

actualizarGrafico();
}

// ===== FILTRO =====
filtroDia.onchange=aplicarFiltro;
buscar.oninput=aplicarFiltro;

function aplicarFiltro(){
let t=buscar.value.toLowerCase();
for(let f of tablaBody.rows){
let d=f.cells[4].textContent;
let n=f.cells[1].textContent.toLowerCase();
f.style.display=( (filtroDia.value==="todos"||d===filtroDia.value) && n.includes(t) )?"":"none";
}
}

// ===== EXPORTAR =====
function exportar() {
let csv="sep=;\nCodigo;Nombre;Razon;Telefono;Dia;CCC;DIG;PORTA;TP;IN1;IN2\n";

for(let fila of tablaBody.rows){
let linea=[
fila.cells[0].textContent,
fila.cells[1].textContent,
fila.cells[2].textContent,
fila.cells[3].textContent,
fila.cells[4].textContent
];

for(let i=5;i<=10;i++){
linea.push(fila.cells[i].querySelector("input").checked?"SI":"NO");
}

csv+=linea.join(";")+"\n";
}

let blob=new Blob(["\ufeff"+csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="clientes.csv";
a.click();
}

// ===== AGREGAR =====
form.onsubmit=e=>{
e.preventDefault();

crearFila({
codigo:form.codigo.value,
nombre:form.nombre.value,
razon:form.razon.value,
telefono:form.telefono.value,
dia:form.dia.value,
checks:[false,false,false,false,false,false]
});

guardarDatos();
actualizarGrafico();
form.reset();
};

// INIT
cargarDatos();

// SW
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
