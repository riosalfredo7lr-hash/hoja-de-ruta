<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoja de Ruta</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
.tabs { display:flex; background:#4CAF50; }
.tabs button { flex:1; padding:12px; border:none; background:#4CAF50; color:white; }
.tabs button.active { background:#388E3C; }

.tab { display:none; padding:10px; }
.tab.active { display:block; }

.box { background:white; padding:12px; border-radius:10px; margin-bottom:10px; }

input, select, textarea {
width:100%; padding:10px; margin:6px 0;
font-size:16px; border-radius:6px; border:1px solid #ccc;
}

button {
width:100%; padding:12px; margin-top:6px;
border:none; border-radius:8px;
background:#4CAF50; color:white;
}

.table-container { overflow-x:auto; }
table { width:100%; font-size:12px; border-collapse: collapse;}
th, td { padding:4px; border:1px solid #ccc; text-align:center;}

canvas { width:100%!important; height:220px!important; }
</style>
</head>

<body>

<div class="tabs">
<button class="active" onclick="cambiarTab(0)">Clientes</button>
<button onclick="cambiarTab(1)">Progreso</button>
<button onclick="cambiarTab(2)">Listado</button>
<button onclick="cambiarTab(3)">Mensaje</button>
</div>

<!-- CLIENTES -->
<div class="tab active">
<div class="box">
<form id="form">
<input id="codigo" placeholder="Código" required>
<input id="nombre" placeholder="Nombre" required>
<input id="razon" placeholder="Razón Social" required>
<input id="telefono" placeholder="Teléfono">

<select id="dia" required>
<option value="">Día</option>
<option>Lunes</option><option>Martes</option><option>Miércoles</option>
<option>Jueves</option><option>Viernes</option><option>Sábado</option>
</select>

<button>Agregar</button>
</form>
</div>
</div>

<!-- PROGRESO -->
<div class="tab">
<div class="box">
CCC <input type="number" id="objCCC">
DIG <input type="number" id="objDIG">
PORTA <input type="number" id="objPORTA">
TP <input type="number" id="objTP">
<button onclick="guardarObjetivos()">Guardar objetivos</button>
</div>

<div class="box">
<canvas id="grafico"></canvas>
</div>
</div>

<!-- LISTADO -->
<div class="tab">
<div class="box">
<select id="filtroDia">
<option value="todos">Todos</option>
<option>Lunes</option><option>Martes</option><option>Miércoles</option>
<option>Jueves</option><option>Viernes</option><option>Sábado</option>
</select>

<input id="buscar" placeholder="Buscar cliente...">

<input type="file" id="importar" accept=".xlsx">
<button onclick="importarExcel()">Importar Excel</button>

<button onclick="exportar()">Exportar</button>
</div>

<div class="box table-container">
<table id="tabla">
<thead>
<tr>
<th>Cod</th><th>Nom</th><th>Razón</th><th>Tel</th><th>Día</th>
<th>CCC</th><th>DIG</th><th>PORTA</th><th>TP</th><th>IN1</th><th>IN2</th>
<th>Editar</th><th>WA</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- MENSAJE -->
<div class="tab">
<div class="box">
<textarea id="mensaje" placeholder="Hola {nombre}..."></textarea>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

// TABS
function cambiarTab(i){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
document.querySelectorAll(".tab")[i].classList.add("active");
document.querySelectorAll(".tabs button")[i].classList.add("active");
}

const tabla = document.querySelector("#tabla tbody");

// CREAR FILA
function crearFila(cli){
let f = tabla.insertRow();

f.insertCell(0).textContent = cli.codigo;
f.insertCell(1).textContent = cli.nombre;
f.insertCell(2).textContent = cli.razon;
f.insertCell(3).textContent = cli.telefono;
f.insertCell(4).textContent = cli.dia;

(cli.checks || [false,false,false,false,false,false]).forEach(ch=>{
let c=document.createElement("input");
c.type="checkbox";
c.checked=ch;
c.onchange=actualizarGrafico;
f.insertCell(-1).appendChild(c);
});

// EDITAR
let btnE=document.createElement("button");
btnE.textContent="Editar";

btnE.onclick=()=>{
if(btnE.textContent==="Editar"){
for(let i=0;i<5;i++){
let v=f.cells[i].textContent;
f.cells[i].innerHTML=`<input value="${v}">`;
}
btnE.textContent="Guardar";
}else{
for(let i=0;i<5;i++){
f.cells[i].textContent=f.cells[i].querySelector("input").value;
}
btnE.textContent="Editar";
filtrar();
}
};

f.insertCell(-1).appendChild(btnE);

// WHATSAPP
let btnW=document.createElement("button");
btnW.textContent="WA";
btnW.onclick=()=>{
let tel=f.cells[3].textContent.replace(/\D/g,"");
if(!tel.startsWith("54")) tel="54"+tel;
let msg=mensaje.value.replace("{nombre}",f.cells[1].textContent);
window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
};
f.insertCell(-1).appendChild(btnW);
}

// FORM
form.onsubmit=e=>{
e.preventDefault();

crearFila({
codigo:codigo.value,
nombre:nombre.value,
razon:razon.value,
telefono:telefono.value,
dia:dia.value,
checks:[false,false,false,false,false,false]
});

actualizarGrafico();
filtrar();
form.reset();
};

// FILTRO
buscar.oninput=filtrar;
filtroDia.onchange=filtrar;

function filtrar(){
let texto=buscar.value.toLowerCase();
let dia=filtroDia.value;

for(let f of tabla.rows){
let t=(f.cells[0].textContent+" "+f.cells[1].textContent).toLowerCase();
f.style.display=(t.includes(texto) && (dia==="todos"||f.cells[4].textContent===dia))?"":"none";
}
}

// EXPORTAR
function exportar(){
let csv="sep=;\nCodigo;Nombre;Razon;Telefono;Dia;CCC;DIG;PORTA;TP;IN1;IN2\n";

for(let f of tabla.rows){
let l=[f.cells[0].textContent,f.cells[1].textContent,f.cells[2].textContent,f.cells[3].textContent,f.cells[4].textContent];

for(let i=5;i<=10;i++){
l.push(f.cells[i].querySelector("input").checked?"SI":"NO");
}

csv+=l.join(";")+"\n";
}

let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob(["\ufeff"+csv]));
a.download="clientes.csv";
a.click();
}

// IMPORTAR SIN BORRAR
function importarExcel(){
let file=document.getElementById("importar").files[0];
if(!file) return alert("Seleccioná archivo");

let reader=new FileReader();

reader.onload=e=>{
let data=new Uint8Array(e.target.result);
let workbook=XLSX.read(data,{type:"array"});

let hoja=workbook.Sheets[workbook.SheetNames[0]];
let json=XLSX.utils.sheet_to_json(hoja,{defval:""});

let existentes=[...tabla.rows].map(f=>f.cells[0].textContent);

let add=0, dup=0;

json.forEach(r=>{
let cod=(r.Codigo||"").toString().trim();
if(!cod) return;

if(existentes.includes(cod)){ dup++; return; }

crearFila({
codigo:r.Codigo,
nombre:r.Nombre,
razon:r.Razon,
telefono:r.Telefono,
dia:r.Dia,
checks:[r.CCC==="SI",r.DIG==="SI",r.PORTA==="SI",r.TP==="SI",r.IN1==="SI",r.IN2==="SI"]
});

existentes.push(cod);
add++;
});

actualizarGrafico();
filtrar();

alert(`✔ ${add} agregados\n⚠ ${dup} duplicados`);
};

reader.readAsArrayBuffer(file);
}

// GRAFICO
function actualizarGrafico(){
let c={CCC:0,DIG:0,PORTA:0,TP:0};

for(let f of tabla.rows){
if(f.cells[5].querySelector("input").checked)c.CCC++;
if(f.cells[6].querySelector("input").checked)c.DIG++;
if(f.cells[7].querySelector("input").checked)c.PORTA++;
if(f.cells[8].querySelector("input").checked)c.TP++;
}

let ctx=grafico.getContext("2d");
ctx.clearRect(0,0,400,200);

let i=0;
for(let k in c){
let h=c[k]*10;
ctx.fillStyle="#4CAF50";
ctx.fillRect(i*80+30,180-h,30,h);
ctx.fillText(k,i*80+30,195);
ctx.fillText(c[k],i*80+35,180-h-5);
i++;
}
}

</script>

</body>
</html>
