<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta charset="UTF-8">
<title>Clientes</title>

<style>
body { font-family: Arial; padding: 20px; background: #f4f4f4; }
form, .filtro, .mensaje-box { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
input, select, button, textarea { padding: 6px; margin: 5px; }
textarea { width: 100%; height: 60px; }
table { width: 100%; border-collapse: collapse; background: white; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background: #ddd; }
button { cursor: pointer; }
</style>
</head>

<body>

<h2>Cargar Cliente</h2>

<form id="form">
<input type="text" id="codigo" placeholder="Código" required>
<input type="text" id="nombre" placeholder="Nombre de contacto" required>
<input type="text" id="razon" placeholder="Razón Social" required>
<input type="text" id="telefono" placeholder="Teléfono">

<select id="dia" required>
<option value="">Día</option>
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
<option>Sábado</option>
</select>

<button type="submit">Agregar</button>
</form>

<div class="mensaje-box">
<strong>Mensaje (usar {nombre}):</strong>
<textarea id="mensaje"></textarea>
</div>

<div class="filtro">
<strong>Filtrar por día:</strong>
<select id="filtroDia">
<option value="todos">Todos</option>
<option>Lunes</option>
<option>Martes</option>
<option>Miércoles</option>
<option>Jueves</option>
<option>Viernes</option>
<option>Sábado</option>
</select>

<input type="text" id="buscar" placeholder="Buscar por nombre...">
</div>

<div class="filtro">
<strong>Objetivos:</strong>
<canvas id="grafico" width="400" height="200"></canvas>
</div>

<button onclick="exportar()">📥 Exportar datos</button>

<h2>Listado</h2>

<table id="tabla">
<thead>
<tr>
<th>Código</th>
<th>Nombre</th>
<th>Razón</th>
<th>Teléfono</th>
<th>Día</th>
<th>CCC</th>
<th>DIG</th>
<th>PORTA</th>
<th>TP</th>
<th>IN1</th>
<th>IN2</th>
<th>Editar</th>
<th>WhatsApp</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const tablaBody = document.querySelector("#tabla tbody");
const form = document.getElementById("form");
const mensajeInput = document.getElementById("mensaje");
const filtroDia = document.getElementById("filtroDia");
const buscar = document.getElementById("buscar");
const grafico = document.getElementById("grafico");

// ===== GUARDAR =====
function guardarDatos() {
const datos = [];
for (let fila of tablaBody.rows) {
datos.push({
codigo: fila.cells[0].textContent,
nombre: fila.cells[1].textContent,
razon: fila.cells[2].textContent,
telefono: fila.cells[3].textContent,
dia: fila.cells[4].textContent,
checks: [...Array(6)].map((_,i)=>fila.cells[i+5].querySelector("input").checked)
});
}
localStorage.setItem("clientes", JSON.stringify(datos));
}

// ===== MENSAJE =====
mensajeInput.oninput = ()=> localStorage.setItem("mensajeWA", mensajeInput.value);

// ===== GRAFICO =====
function actualizarGrafico() {
let c = {CCC:0,DIG:0,PORTA:0,TP:0};

for (let fila of tablaBody.rows) {
if (fila.cells[5].querySelector("input").checked) c.CCC++;
if (fila.cells[6].querySelector("input").checked) c.DIG++;
if (fila.cells[7].querySelector("input").checked) c.PORTA++;
if (fila.cells[8].querySelector("input").checked) c.TP++;
}

const ctx = grafico.getContext("2d");
const width = grafico.width;
const height = grafico.height;

ctx.clearRect(0,0,width,height);

const vals = Object.values(c);
const keys = Object.keys(c);
const max = Math.max(...vals,1);

vals.forEach((v,i)=>{
let barWidth = width / vals.length;
let h = (v/max)*(height-50);
let x = i*barWidth + 20;
let y = height - h - 20;

ctx.fillStyle="#4CAF50";
ctx.fillRect(x,y,40,h);

ctx.fillStyle="black";
ctx.fillText(keys[i],x, height-5);
ctx.fillText(v,x+10,y-5);
});
}

// ===== CREAR FILA =====
function crearFila(cli) {
const fila = tablaBody.insertRow();

fila.insertCell(0).textContent=cli.codigo;
fila.insertCell(1).textContent=cli.nombre;
fila.insertCell(2).textContent=cli.razon;
fila.insertCell(3).textContent=cli.telefono;
fila.insertCell(4).textContent=cli.dia;

cli.checks.forEach(chk=>{
let c=document.createElement("input");
c.type="checkbox";
c.checked=chk;
c.onchange=()=>{guardarDatos();actualizarGrafico();};
fila.insertCell(-1).appendChild(c);
});

// EDITAR
let celdaE=fila.insertCell(-1);
let btnE=document.createElement("button");
btnE.textContent="Editar";

btnE.onclick=()=>{
if(btnE.textContent==="Editar"){
for(let i=0;i<5;i++){
let v=fila.cells[i].textContent;
fila.cells[i].innerHTML=`<input value="${v}">`;
}
btnE.textContent="Guardar";
}else{
if(!confirm("¿Guardar cambios?")) return;

for(let i=0;i<5;i++){
fila.cells[i].textContent=fila.cells[i].querySelector("input").value;
}
btnE.textContent="Editar";
guardarDatos();
aplicarFiltro();
}
};
celdaE.appendChild(btnE);

// WHATSAPP
let celdaW=fila.insertCell(-1);
let btnW=document.createElement("button");
btnW.textContent="WhatsApp";

btnW.onclick=()=>{
let tel=fila.cells[3].textContent.replace(/\D/g,"");

// formato Argentina
if (!tel.startsWith("54")) tel = "54" + tel;

let nombre=fila.cells[1].textContent;
let msg=mensajeInput.value.replace("{nombre}",nombre);

window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`);
};
celdaW.appendChild(btnW);
}

// ===== CARGAR =====
function cargarDatos(){
(JSON.parse(localStorage.getItem("clientes"))||[])
.forEach(crearFila);

mensajeInput.value=localStorage.getItem("mensajeWA")||"";

actualizarGrafico();
}

// ===== FILTRO =====
filtroDia.onchange=aplicarFiltro;
buscar.oninput=aplicarFiltro;

function aplicarFiltro(){
let texto = buscar.value.toLowerCase();

for(let f of tablaBody.rows){
let d=f.cells[4].textContent;
let nombre=f.cells[1].textContent.toLowerCase();

let coincideDia = (filtroDia.value==="todos"||d===filtroDia.value);
let coincideTexto = nombre.includes(texto);

f.style.display=(coincideDia && coincideTexto)?"":"none";
}
}

// ===== EXPORTAR =====
function exportar() {
  let filas = [];
  
  // encabezados
  filas.push([
    "Codigo","Nombre","Razon","Telefono","Dia",
    "CCC","DIG","PORTA","TP","IN1","IN2"
  ]);

  for (let fila of tablaBody.rows) {
    let datos = [
      fila.cells[0].textContent,
      fila.cells[1].textContent,
      fila.cells[2].textContent,
      fila.cells[3].textContent,
      fila.cells[4].textContent
    ];

    // checkboxes
    for (let i = 5; i <= 10; i++) {
      datos.push(fila.cells[i].querySelector("input").checked ? "SI" : "NO");
    }

    filas.push(datos);
  }

  // convertir a CSV
  let csv = filas.map(f => f.join(",")).join("\n");

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "clientes.csv";
  document.body.appendChild(a);
  a.click();

  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ===== AGREGAR =====
form.onsubmit=e=>{
e.preventDefault();

crearFila({
codigo:form.codigo.value,
nombre:form.nombre.value,
razon:form.razon.value,
telefono:form.telefono.value,
dia:form.dia.value,
checks:[false,false,false,false,false,false]
});

guardarDatos();
actualizarGrafico();
form.reset();
};

// INIT
cargarDatos();
  if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker registrado"));
}
</script>

</body>
</html>
